<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivi de chantiers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Style Apple-like -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-light bg-white border-bottom sticky-top shadow-sm">
    <div class="container-fluid app-container">
      <span class="navbar-brand mb-0 h1">Suivi chantiers</span>
      <span class="text-muted small">Interface type Notion · Style Apple-like</span>
    </div>
  </nav>

  <main class="app-container">

    <!-- TABS -->
    <ul class="nav nav-pills mb-4">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#chantiers">Chantiers</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#taches">Tâches</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#fournisseurs">Fournisseurs</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#facturation">Facturation</button></li>
    </ul>

    <div class="tab-content">

      <!-- CHANTIERS -->
      <div class="tab-pane fade show active" id="chantiers">
        <div class="card mb-4">
          <div class="card-body">

            <h5 class="card-title mb-3">Nouveau chantier</h5>

            <form id="formChantier" class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Nom du chantier</label>
                <input type="text" class="form-control" id="chantierNom" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Client</label>
                <input type="text" class="form-control" id="chantierClient">
              </div>

              <div class="col-md-8 position-relative">
                <label class="form-label">Adresse</label>
                <input type="text" class="form-control" id="chantierAdresse" autocomplete="off">
                <div id="adresseSuggestions" class="list-group position-absolute w-100 shadow-sm"></div>
              </div>

              <div class="col-md-4">
                <label class="form-label">Coordonnées GPS</label>
                <input type="text" class="form-control" id="chantierGPS" disabled>
              </div>

              <div class="col-12">
                <div id="map"></div>
              </div>

              <div class="col-md-3">
                <label class="form-label">Montant devis (€)</label>
                <input type="number" class="form-control" id="chantierMontant">
              </div>

              <div class="col-md-3">
                <label class="form-label">% Acompte</label>
                <input type="number" class="form-control" id="chantierPctAcompte" value="30">
              </div>

              <div class="col-md-3">
                <label class="form-label">% Mi-chantier</label>
                <input type="number" class="form-control" id="chantierPctMi" value="40">
              </div>

              <div class="col-md-3">
                <label class="form-label">% Fin</label>
                <input type="number" class="form-control" id="chantierPctFin" value="30">
              </div>

              <div class="col-12 d-flex justify-content-end">
                <button class="btn btn-dark px-4">Ajouter</button>
              </div>

            </form>

          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <h5 class="card-title mb-3">Chantiers</h5>
            <table class="table" id="tableChantiers">
              <thead>
                <tr>
                  <th>Nom</th>
                  <th>Client</th>
                  <th>Adresse</th>
                  <th>GPS</th>
                  <th>Montant</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

      </div>

      <!-- TÂCHES -->
      <div class="tab-pane fade" id="taches">
        <h5 class="mb-3">Tâches (à venir)</h5>
      </div>

      <!-- FOURNISSEURS -->
      <div class="tab-pane fade" id="fournisseurs">
        <h5 class="mb-3">Fournisseurs (à venir)</h5>
      </div>

      <!-- FACTURATION -->
      <div class="tab-pane fade" id="facturation">
        <h5 class="mb-3">Facturation (à venir)</h5>
      </div>

    </div>
  </main>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- JS séparés -->
  <script src="js/map.js"></script>
  <script src="js/api-adresse.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
